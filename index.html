<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LocalAI Studio Pro - Enhanced</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --glass-bg: rgba(255,255,255,0.03);
  --glass-border: rgba(255,255,255,0.06);
  --glass-hover: rgba(255,255,255,0.07);
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --accent-glow: rgba(99,102,241,0.3);
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --success: #10b981;
  --warning: #f59e0b;
  --error: #ef4444;
  --radius: 12px;
  --radius-lg: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --transition: all 0.2s ease;
}
html, body {
  height: 100%; font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg-primary); color: var(--text-primary);
  overflow: hidden;
}
#app {
  display: flex; height: 100vh; overflow: hidden;
}

/* Flexible Sidebar */
.sidebar {
  width: 260px; min-width: 260px; background: var(--bg-secondary);
  border-right: 1px solid var(--glass-border);
  display: flex; flex-direction: column; padding: 16px;
  z-index: 10;
}
.brand {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 8px 20px; border-bottom: 1px solid var(--glass-border);
  margin-bottom: 16px;
}
.brand-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.brand h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.brand span { font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px; }
.nav-section { font-size: 10px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; padding: 12px 8px 6px; font-weight: 600; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: 10px; cursor: pointer;
  transition: var(--transition); color: var(--text-secondary);
  font-size: 14px; font-weight: 500; margin-bottom: 2px;
  border: 1px solid transparent;
}
.nav-item:hover { background: var(--glass-hover); color: var(--text-primary); }
.nav-item.active {
  background: rgba(99,102,241,0.12); color: var(--accent-hover);
  border-color: rgba(99,102,241,0.2);
}
.nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
.sidebar-footer {
  margin-top: auto; padding-top: 16px; border-top: 1px solid var(--glass-border);
}
.status-badge {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-radius: 10px;
  background: var(--glass-bg); font-size: 12px;
  color: var(--text-secondary);
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 8px rgba(16,185,129,0.5);
}
.status-dot.loading { background: var(--warning); box-shadow: 0 0 8px rgba(245,158,11,0.5); animation: pulse 1.5s infinite; }
.status-dot.error { background: var(--error); box-shadow: 0 0 8px rgba(239,68,68,0.5); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Flexible Main Layout */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px; border-bottom: 1px solid var(--glass-border);
  background: rgba(10,10,15,0.8); backdrop-filter: blur(12px);
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-title { font-size: 16px; font-weight: 600; }
.topbar-subtitle { font-size: 12px; color: var(--text-muted); }
.topbar-actions { display: flex; gap: 8px; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 8px; border: 1px solid var(--glass-border);
  background: var(--glass-bg); color: var(--text-secondary);
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: var(--transition); font-family: inherit;
}
.btn:hover { background: var(--glass-hover); color: var(--text-primary); border-color: rgba(255,255,255,0.1); }
.btn-primary {
  background: var(--accent); border-color: var(--accent); color: #fff;
}
.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn svg { width: 16px; height: 16px; }

/* Flexible Chat Area */
.chat-container {
  flex: 1; overflow-y: auto; padding: 24px;
  scroll-behavior: smooth;
}
.chat-container::-webkit-scrollbar { width: 6px; }
.chat-container::-webkit-scrollbar-track { background: transparent; }
.chat-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
.chat-container::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

.welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; text-align: center;
  padding: 40px;
}
.welcome-icon {
  width: 72px; height: 72px; border-radius: 20px;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; margin-bottom: 24px;
  box-shadow: 0 8px 32px var(--accent-glow);
}
.welcome h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
.welcome p { color: var(--text-secondary); font-size: 15px; max-width: 400px; line-height: 1.6; }

.message {
  display: flex; gap: 12px; margin-bottom: 24px;
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.message.user { flex-direction: row-reverse; }
.message-avatar {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0; margin-top: 2px;
}
.message.assistant .message-avatar {
  background: linear-gradient(135deg, var(--accent), #a855f7);
}
.message.user .message-avatar {
  background: rgba(255,255,255,0.1);
}
.message-content {
  max-width: 75%; padding: 12px 16px;
  border-radius: 12px; font-size: 14px; line-height: 1.6;
}
.message.user .message-content {
  background: var(--accent); color: #fff;
  border-bottom-right-radius: 4px;
}
.message.assistant .message-content {
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  border-bottom-left-radius: 4px;
}
.message-content p { margin-bottom: 8px; }
.message-content p:last-child { margin-bottom: 0; }
.message-content pre {
  background: rgba(0,0,0,0.3); border-radius: 8px;
  padding: 12px; overflow-x: auto; margin: 8px 0;
  border: 1px solid rgba(255,255,255,0.05);
}
.message-content code {
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 13px;
}
.message-content :not(pre) > code {
  background: rgba(255,255,255,0.08); padding: 2px 6px;
  border-radius: 4px; font-size: 12px;
}
.message-content ul, .message-content ol { padding-left: 20px; margin: 8px 0; }
.message-content li { margin-bottom: 4px; }
.message-content strong { font-weight: 600; }

.typing-indicator {
  display: flex; gap: 4px; padding: 4px 0;
}
.typing-indicator span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-muted); animation: typing 1.4s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

/* Flexible Input Area */
.input-area {
  padding: 16px 24px 20px; border-top: 1px solid var(--glass-border);
  background: rgba(10,10,15,0.6); backdrop-filter: blur(12px);
}
.input-wrapper {
  display: flex; align-items: flex-end; gap: 8px;
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  border-radius: 14px; padding: 8px 12px;
  transition: var(--transition);
}
.input-wrapper:focus-within { border-color: rgba(99,102,241,0.3); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
#chat-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text-primary); font-size: 14px;
  font-family: inherit; resize: none; max-height: 120px;
  line-height: 1.5; padding: 4px 0;
}
#chat-input::placeholder { color: var(--text-muted); }
.input-actions { display: flex; gap: 4px; align-items: center; }
.input-btn {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: var(--transition);
  background: none; border: none; color: var(--text-muted);
}
.input-btn:hover { background: var(--glass-hover); color: var(--text-primary); }
.input-btn.recording { background: rgba(239,68,68,0.15); color: var(--error); }
.send-btn {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: var(--transition);
  background: var(--accent); border: none; color: #fff;
}
.send-btn:hover { background: var(--accent-hover); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.input-btn svg, .send-btn svg { width: 18px; height: 18px; }
.file-preview {
  display: flex; gap: 8px; padding: 8px 0; flex-wrap: wrap;
}
.file-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 6px;
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  font-size: 12px; color: var(--text-secondary);
}
.file-chip .remove { cursor: pointer; opacity: 0.6; }
.file-chip .remove:hover { opacity: 1; }

/* Model Selection Section */
.model-selection {
  margin: 20px 0;
  padding: 15px;
  background: var(--glass-bg);
  border-radius: 10px;
  border: 1px solid var(--glass-border);
}
.model-title {
  font-weight: 600;
  margin-bottom: 10px;
  color: var(--text-primary);
}
.model-option {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 8px 0;
  padding: 10px;
  background: var(--glass-hover);
  border-radius: 8px;
  cursor: pointer;
  transition: var(--transition);
}
.model-option:hover {
  background: var(--glass-bg);
}
.model-option.selected {
  background: rgba(99,102,241,0.2);
  border: 1px solid var(--accent);
}
.model-icon {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}
.model-info h4 { font-weight: 600; margin-bottom: 2px; }
.model-info p { font-size: 12px; color: var(--text-muted); }
.download-progress {
  width: 100%;
  height: 4px;
  background: var(--glass-bg);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}
.download-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), #a855f7);
  border-radius: 2px;
  transition: width 0.3s;
}
.download-status {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
  text-align: right;
}

/* Error Handling */
.error-message {
  background: rgba(239,68,68,0.1);
  border: 1px solid var(--error);
  color: var(--error);
  padding: 12px;
  border-radius: 8px;
  margin: 10px 0;
  font-size: 13px;
}
.retry-btn {
  background: var(--error);
  color: white;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
  margin-top: 8px;
  cursor: pointer;
}
.retry-btn:hover {
  background: #dc2626;
}

/* Responsive */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .message-content { max-width: 85%; }
}
</style>
</head>

    <div class="brand">
      <div class="brand-icon">🧠</div>
      <div>

        <span>Offline AI Workspace</span>
      </div>
    </div>
